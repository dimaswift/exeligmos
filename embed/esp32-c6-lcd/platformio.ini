; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c6-devkitc-1]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
lib_deps =
    ESP32C6LCD147
    symlink://../octal-glyph-lvgl
build_src_filter = +<*> -<benchmark_main.cpp>

; OctalGlyph render-time benchmark: adds 6 glyphs at a time to the real
; display and times each batch with lv_refr_now(). Build/flash with:
;   pio run -e benchmark -t upload
;   pio device monitor          (to see the CSV log: cycle,glyphs_added,total_glyphs,render_us)
[env:benchmark]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
lib_deps =
    ESP32C6LCD147
    symlink://../octal-glyph-lvgl
build_src_filter = -<*> +<benchmark_main.cpp>
monitor_speed = 115200