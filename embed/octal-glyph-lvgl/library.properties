name=octal-glyph-lvgl
version=0.1.0
author=Exeligmos
maintainer=Exeligmos
sentence=LVGL widget that renders OctalGlyphs (radial core-ring + digit-arm glyphs) at a specified depth, color, and size.
paragraph=Fixed 120x120px canvas. Core ring is live-drawn with LVGL's lv_draw_arc; each digit arm is a pre-rendered PROGMEM sprite (baked offline) composited with lv_draw_image -- no ThorVG, no vector-graphics module, no triangulation, no runtime shape math, no dependency beyond LVGL. Works on any LVGL 9 target.
