  /v1/records:
    get:
      operationId: listRecords
      tags: [Records]
      summary: List the authenticated user's records
      description: |
        Results are ordered by server `updatedAt` descending and then by ID so
        public and private records share one stable order. Private records are
        returned as ciphertext envelopes; this endpoint never decrypts them.
        Occurrence-time and tag filters apply only to public records and exclude
        private records because those fields remain inside private ciphertext.
      x-required-scopes: [records:read]
      parameters:
