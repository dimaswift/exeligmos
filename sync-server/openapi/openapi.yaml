      responses:
        '204':
          description: Event deleted and tombstone emitted.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/public/events:
    get:
      operationId: listPublicEvents
      tags: [Events]
      summary: List public events
      description: Public events are ordered by occurrence time and never expose a device ID.
      security: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          style: form
          explode: true
          schema:
            type: array
            maxItems: 50
            items:
              type: integer
              format: int32
              minimum: 0
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Public event page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicEventPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/public/events/{eventId}:
    get:
      operationId: getPublicEvent
      tags: [Events]
      summary: Get one public event
      security: []
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Public event projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicEventProjection'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/public/users/{login}:
    get:
      operationId: getPublicUser
      tags: [Social]
      summary: Resolve a public profile by stable login
      description: |
        Returns 404 while the user is disabled. A `user` lifecycle item in the
        public activity stream uses this URL: `delete` removes the public
        projection and `upsert` makes it fetchable again.
      security: []
      parameters:
        - name: login
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/LoginName'
      responses:
        '200':
          description: Public user profile and public-resource counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfile'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/subscriptions:
    get:
      operationId: listSubscriptions
      tags: [Social]
      summary: List the authenticated user's subscriptions
      x-required-scopes: [subscriptions:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Private owner subscription page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/subscriptions/{targetUserId}:
    parameters:
      - name: targetUserId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: putSubscription
      tags: [Social]
      summary: Subscribe to a public user or update feed kinds
      x-required-scopes: [subscriptions:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionInput'
      responses:
        '200':
          description: Existing subscription updated or retained.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '201':
          description: Subscription created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: deleteSubscription
      tags: [Social]
      summary: Stop following a public user
      x-required-scopes: [subscriptions:write]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Subscription removed and owner tombstone emitted.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/public/activity:
    get:
      operationId: listPublicActivity
      tags: [Public activity]
      summary: Read the global public activity cursor
      description: |
        Returns append-only user lifecycle controls and record/event revision
        notifications in commit-safe sequence order. Payloads are fetched from
        each `resourceUrl`; activity items never embed resource payloads.

        For `resourceType: user`, `delete` means the profile is no longer
        public and clients must hide or purge every cached public resource from
        that actor. `upsert` means the profile is public again and clients must
        refetch the profile plus the actor-filtered public record/event lists.
        User lifecycle controls are automatically included when records or
        events are selected so a filtered cursor cannot skip an invalidation.

        User lifecycle is status-based and this API does not hard-delete
        users. Administrative hard deletion is a destructive feed-reset
        operation: consumers must discard cursors and rebuild afterward.
      security: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/PublicActivitySnapshot'
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PublicActivityResourceTypeFilter'
      responses:
        '200':
          description: Global public activity page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicActivityPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/activity:
    get:
      operationId: listFollowingActivity
      tags: [Public activity]
      summary: Read public activity from subscribed users
      x-required-scopes: [subscriptions:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/PublicActivitySnapshot'
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PublicActivityResourceTypeFilter'
      responses:
        '200':
          description: Subscription-filtered public activity page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicActivityPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  securitySchemes:
    JwtBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived Ed25519-signed access JWT issued by login or refresh. The
        token includes `iss`, `aud`, `sub`, `exp`, and `kid` claims.
    ApiKeyBearer:
      type: http
      scheme: bearer
      bearerFormat: Exeligmos API key
      description: |
        User-issued secret beginning with `exk_`. Keys are stored hashed,
        device-bound, scoped, independently expirable, and revocable. The
        plaintext secret appears only in the initial creation response; a replay
        returns the created `apiKeyId`, never the secret.
  parameters:
    ApiKeyId:
      name: apiKeyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RecordId:
      name: recordId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RecordPublicId'
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UploadId:
      name: uploadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor returned by the immediately preceding page.
      schema:
        type: string
        minLength: 1
        maxLength: 2048
    Limit:
      name: limit
      in: query
      description: Maximum number of items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    RecordLimit:
      name: limit
      in: query
      description: |
        Maximum records to return. Record pages are deliberately smaller than
        lightweight resource pages because each item may contain a large
        public payload or private ciphertext envelope.
      schema:
        type: integer
        minimum: 1
        maximum: 25
        default: 10
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Caller-generated identifier for one logical mutation. It must be reused
        for retries of the same body and must not be reused for another body.
        Most operations replay their original response. API-key creation is the
        deliberate exception: replay returns a 409 problem containing the
        created `apiKeyId` because its plaintext secret is returned only once.
      schema:
        type: string
        minLength: 8
        maxLength: 255
        pattern: '^[\x21-\x7E]+$'
      example: 01J2V7YCB9Q3WZ2P6AQ03M6DN8
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Strong ETag of the revision being mutated.
      schema:
        type: string
        minLength: 3
        maxLength: 200
      example: '"record-aB_9Z-r4"'
    VisibilityFilter:
      name: visibility
      in: query
      schema:
        $ref: '#/components/schemas/RecordVisibility'
    DeviceIdFilter:
      name: deviceId
      in: query
      schema:
        type: string
        format: uuid
    TagIdFilter:
      name: tagId
      in: query
      schema:
        type: string
        format: uuid
    OccurredAfter:
      name: occurredAfter
      in: query
      description: Inclusive lower bound on public record occurrence time.
      schema:
        type: string
        format: date-time
    OccurredBefore:
      name: occurredBefore
      in: query
      description: Exclusive upper bound on public record occurrence time.
      schema:
        type: string
        format: date-time
    UpdatedAfter:
      name: updatedAfter
      in: query
      description: Inclusive lower bound on server update time.
      schema:
        type: string
        format: date-time
    PublicActivityResourceTypeFilter:
      name: resourceType
      in: query
      description: |
        Repeat to select users, records, and/or events. Selecting records or
        events automatically includes user lifecycle controls required to
        invalidate cached resources safely.
      style: form
      explode: true
      schema:
        type: array
        maxItems: 3
        uniqueItems: true
        items:
          $ref: '#/components/schemas/PublicActivityResourceType'
    PublicActivitySnapshot:
      name: snapshot
      in: query
      description: |
        Set to `latest` only when `cursor` is omitted to receive at most the
        newest `limit` matching notifications, returned in canonical ascending
        sequence order. The page intentionally omits older history, reports
        `hasMore: false`, and returns a normal cursor anchored at the
        repeatable-read high-water mark. Resume live changes by sending that
        cursor on a subsequent request without `snapshot`.
      schema:
        type: string
        enum: [latest]
  headers:
    ETag:
      description: Strong opaque validator for the returned resource revision.
      schema:
        type: string
      example: '"record-aB_9Z-r4"'
    RequestId:
      description: Server-assigned request correlation identifier.
      schema:
        type: string
        minLength: 1
        maxLength: 128
  responses:
    BadRequest:
      description: The request syntax, parameter combination, or cursor is invalid.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.exeligmos.app/problems/invalid-request
            title: Invalid request
            status: 400
            detail: The occurredAfter timestamp must precede occurredBefore.
            code: invalid_request
            requestId: req_01J2V8E3VBA5QYFAE6BX27DE5Z
    Unauthorized:
      description: Authentication is missing, expired, revoked, or invalid.
      headers:
        WWW-Authenticate:
          schema:
            type: string
          example: Bearer realm="exeligmos"
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: The credential lacks the scope or ownership required for this operation.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: The resource is absent or is not visible to this caller.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: The mutation conflicts with current state or idempotency history.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    CursorExpired:
      description: The cursor predates retained change history; perform a full reconciliation.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.exeligmos.app/problems/cursor-expired
            title: Synchronization cursor expired
            status: 410
            detail: Perform a full collection reconciliation before restarting the change feed.
            code: cursor_expired
            requestId: req_01J2V8E3VBA5QYFAE6BX27DE5Z
    PreconditionFailed:
      description: "`If-Match` does not match the current resource revision."
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PayloadTooLarge:
      description: The request or declared media object exceeds configured bounds.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableContent:
      description: The request is syntactically valid but violates domain constraints.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationProblem'
    ServiceUnavailable:
      description: A database statement or lock exceeded its safety deadline; the operation may be retried.
      headers:
        Retry-After:
          description: Minimum number of seconds to wait before retrying.
          schema:
            type: integer
            minimum: 1
          example: 1
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:exeligmos:problem:database-timeout
            title: Service Unavailable
            status: 503
            detail: The database could not complete the request within its safety deadline.
            code: database_timeout
            requestId: req_01J2V8E3VBA5QYFAE6BX27DE5Z
    TooManyRequests:
      description: Rate or concurrency limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Liveness:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok
      additionalProperties: false
    DependencyStatus:
      type: string
      enum: [up, down, unknown]
    ReadinessChecks:
      type: object
      required: [database, pgvector]
      properties:
        database:
          $ref: '#/components/schemas/DependencyStatus'
        pgvector:
          $ref: '#/components/schemas/DependencyStatus'
      additionalProperties: false
    Readiness:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          const: ready
        checks:
          $ref: '#/components/schemas/ReadinessChecks'
      additionalProperties: false
    Problem:
      type: object
      description: RFC 9457 Problem Details with stable Exeligmos extensions.
      required: [type, title, status, code, requestId]
      properties:
        type:
          type: string
          format: uri-reference
          description: Stable problem type URI.
        title:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
          maxLength: 4000
        instance:
          type: string
          format: uri-reference
        code:
          type: string
          pattern: '^[a-z][a-z0-9_]{1,63}$'
        requestId:
          type: string
          minLength: 1
          maxLength: 128
      additionalProperties: true
    FieldError:
      type: object
      required: [path, code, message]
      properties:
        path:
          type: string
          description: JSON Pointer to the invalid value.
          maxLength: 500
        code:
          type: string
          pattern: '^[a-z][a-z0-9_]{1,63}$'
        message:
          type: string
          minLength: 1
          maxLength: 1000
      additionalProperties: false
    ValidationProblem:
      allOf:
        - $ref: '#/components/schemas/Problem'
        - type: object
          required: [errors]
          properties:
            errors:
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/FieldError'
    ApiKeyCreationConflictProblem:
      allOf:
        - $ref: '#/components/schemas/Problem'
        - type: object
          properties:
            status:
              type: integer
              const: 409
            apiKeyId:
              type: string
              format: uuid
              description: |
                Present when `code` is `api_key_secret_already_returned`; use it
                to inspect or revoke the key with a JWT-authenticated request.
    ReadinessProblem:
      allOf:
        - $ref: '#/components/schemas/Problem'
        - type: object
          required: [checks]
          properties:
            checks:
              $ref: '#/components/schemas/ReadinessChecks'
    JsonObject:
      type: object
      additionalProperties: true
      default: {}
    ResourceMetadata:
      type: object
      description: |
        Must serialize to at most 32768 UTF-8 bytes. Object keys and string
        values must be PostgreSQL-compatible Unicode text; U+0000 and unpaired
        UTF-16 surrogates are rejected.
      x-max-serialized-bytes: 32768
      additionalProperties: true
      default: {}
    Sha256:
      type: string
      description: Lowercase hexadecimal SHA-256 digest.
      pattern: '^[a-f0-9]{64}$'
    MediaContentType:
      type: string
      minLength: 3
      maxLength: 255
      pattern: '^[A-Za-z0-9][A-Za-z0-9.+_-]{0,126}/[A-Za-z0-9][A-Za-z0-9.+_-]{0,126}$'
      description: Concrete type/subtype media type without parameters.
    CursorPageMeta:
      type: object
      required: [hasMore]
      properties:
        nextCursor:
          type: string
          minLength: 1
          maxLength: 2048
        hasMore:
          type: boolean
    RegisterRequest:
      type: object
      required: [login, password]
      properties:
        login:
          $ref: '#/components/schemas/LoginName'
        password:
          $ref: '#/components/schemas/Password'
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        inviteCode:
          type: string
          minLength: 1
          maxLength: 200
      additionalProperties: false
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          $ref: '#/components/schemas/LoginName'
        password:
          $ref: '#/components/schemas/Password'
      additionalProperties: false
    LoginName:
      type: string
      description: Case-insensitive account login stored in normalized form.
      minLength: 3
      maxLength: 64
      pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$'
    CreateEncryptionProfileRequest:
      type: object
      required: [cryptoVersion, keyVersion, keyCheck]
      properties:
        cryptoVersion:
          type: integer
          const: 1
        keyVersion:
          type: integer
          const: 1
        keyCheck:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
          pattern: '^[A-Za-z0-9+/]{43}=$'
          description: 32-byte value defined by crypto profile v1.
      additionalProperties: false
    EncryptionProfile:
      type: object
      required: [userId, cryptoVersion, keyVersion, keyCheck, createdAt]
      properties:
        userId:
          type: string
          format: uuid
          readOnly: true
        cryptoVersion:
          type: integer
          const: 1
        keyVersion:
          type: integer
          const: 1
        keyCheck:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
          pattern: '^[A-Za-z0-9+/]{43}=$'
        createdAt:
          type: string
          format: date-time
          readOnly: true
      additionalProperties: false
    Password:
      type: string
      format: password
      minLength: 12
      maxLength: 1024
      writeOnly: true
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 32
          maxLength: 2048
          writeOnly: true
      additionalProperties: false
    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 32
          maxLength: 2048
          writeOnly: true
      additionalProperties: false
    AuthSession:
      type: object
      required:
        - tokenType
        - accessToken
        - expiresIn
        - refreshToken
        - refreshExpiresIn
        - user
      properties:
        tokenType:
          type: string
          const: Bearer
        accessToken:
          type: string
          minLength: 32
          readOnly: true
        expiresIn:
          type: integer
          description: Access-token lifetime in seconds.
          minimum: 1
        refreshToken:
          type: string
          minLength: 32
          readOnly: true
        refreshExpiresIn:
          type: integer
          description: Refresh-token lifetime in seconds.
          minimum: 1
        user:
          $ref: '#/components/schemas/User'
      additionalProperties: false
    User:
      type: object
      required: [id, login, displayName, sarosAnchor, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        login:
          $ref: '#/components/schemas/LoginName'
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        sarosAnchor:
          $ref: '#/components/schemas/SarosAnchor'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      additionalProperties: false
    UpdateUserRequest:
      type: object
      required: [sarosAnchor]
      properties:
        sarosAnchor:
          $ref: '#/components/schemas/SarosAnchor'
      additionalProperties: false
    SarosAnchor:
      type: integer
      minimum: 1
      maximum: 180
      default: 141
      description: Saros series used as the user's temporal pulse anchor.
    PublicUserSummary:
      type: object
      required: [id, login, displayName, sarosAnchor]
      properties:
        id:
          type: string
          format: uuid
        login:
          $ref: '#/components/schemas/LoginName'
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        sarosAnchor:
          $ref: '#/components/schemas/SarosAnchor'
      additionalProperties: false
    PublicUserProfile:
      allOf:
        - $ref: '#/components/schemas/PublicUserSummary'
        - type: object
          required: [createdAt, publicRecordCount, publicEventCount, followerCount]
          properties:
            createdAt:
              type: string
              format: date-time
            publicRecordCount:
              type: integer
              minimum: 0
            publicEventCount:
              type: integer
              minimum: 0
            followerCount:
              type: integer
              minimum: 0
      unevaluatedProperties: false
    PublicTagSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 120
        emoji:
          type: string
          maxLength: 32
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}([0-9A-Fa-f]{2})?$'
      additionalProperties: false
    SubscriptionInput:
      type: object
      properties:
        includeRecords:
          type: boolean
          default: true
        includeEvents:
          type: boolean
          default: true
      additionalProperties: false
    Subscription:
      type: object
      required:
        [id, userId, targetUser, includeRecords, includeEvents, revision, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        targetUser:
          $ref: '#/components/schemas/SubscriptionTargetUserSummary'
        includeRecords:
          type: boolean
        includeEvents:
          type: boolean
        revision:
          type: integer
          format: int64
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false
    SubscriptionTargetUserSummary:
      type: object
      required: [id, login, displayName, sarosAnchor, status]
      properties:
        id:
          type: string
          format: uuid
        login:
          $ref: '#/components/schemas/LoginName'
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        sarosAnchor:
          $ref: '#/components/schemas/SarosAnchor'
        status:
          type: string
          enum: [active, disabled]
          description: Current account availability for this existing subscription target.
      additionalProperties: false
    SubscriptionPage:
      allOf:
        - $ref: '#/components/schemas/CursorPageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Subscription'
    ApiKeyScope:
      type: string
      description: Stable, additive API-key permission identifier.
      enum:
        - records:read
        - records:write
        - events:read
        - events:write
        - tags:read
        - tags:write
        - templates:read
        - templates:write
        - media:read
        - media:write
        - devices:read
        - subscriptions:read
        - subscriptions:write
        - sync:read
        - sync:write
    CreateApiKeyRequest:
      type: object
      required: [name, deviceId, scopes]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        deviceId:
          type: string
          format: uuid
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ApiKeyScope'
        expiresAt:
          type: string
          format: date-time
          description: Omit for no scheduled expiration.
      additionalProperties: false
    ApiKey:
      type: object
      required:
        - id
        - userId
        - deviceId
        - name
        - prefix
        - scopes
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        userId:
          type: string
          format: uuid
          readOnly: true
        deviceId:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 120
        prefix:
          type: string
          description: Non-secret display prefix.
          pattern: '^exk_[A-Za-z0-9]{4,16}$'
          readOnly: true
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ApiKeyScope'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        expiresAt:
          type: [string, 'null']
          format: date-time
          readOnly: true
        revokedAt:
          type: [string, 'null']
          format: date-time
          readOnly: true
        lastUsedAt:
          type: [string, 'null']
          format: date-time
          readOnly: true
      additionalProperties: false
    CreatedApiKey:
      type: object
      required: [key, secret]
      properties:
        key:
          $ref: '#/components/schemas/ApiKey'
        secret:
          type: string
          pattern: '^exk_[A-Za-z0-9_-]{24,}$'
          readOnly: true
          description: Returned once and never retrievable again.
      additionalProperties: false
    ApiKeyPage:
      allOf:
        - $ref: '#/components/schemas/CursorPageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ApiKey'
    DeviceKind:
      type: string
      enum: [ios, macos, web, agent, server, other]
    CreateDeviceRequest:
      type: object
      required: [name, kind]
      properties:
        id:
          type: string
          format: uuid
          description: Optional stable client-generated ID.
        name:
          type: string
          minLength: 1
          maxLength: 120
        kind:
          $ref: '#/components/schemas/DeviceKind'
        platform:
          type: string
          minLength: 1
          maxLength: 80
        appVersion:
          type: string
          minLength: 1
          maxLength: 80
        metadata:
          $ref: '#/components/schemas/JsonObject'
      additionalProperties: false
    UpdateDeviceRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        platform:
          type: string
          minLength: 1
          maxLength: 80
        appVersion:
          type: string
          minLength: 1
          maxLength: 80
        metadata:
          $ref: '#/components/schemas/JsonObject'
      additionalProperties: false
    Device:
      type: object
      required:
        - id
        - userId
        - name
        - kind
        - metadata
        - revision
        - registeredAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 120
        kind:
          $ref: '#/components/schemas/DeviceKind'
        platform:
          type: string
          maxLength: 80
        appVersion:
          type: string
          maxLength: 80
        metadata:
          $ref: '#/components/schemas/JsonObject'
        revision:
          type: integer
          format: int64
          minimum: 1
          readOnly: true
        registeredAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        lastSeenAt:
          type: [string, 'null']
          format: date-time
          readOnly: true
        revokedAt:
          type: [string, 'null']
          format: date-time
          readOnly: true
      additionalProperties: false
    DevicePage:
      allOf:
        - $ref: '#/components/schemas/CursorPageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Device'
    RecordVisibility:
      type: string
      enum: [public, private]
      description: Chosen when the record is created and immutable thereafter.
    RecordPublicId:
      type: string
      minLength: 5
      maxLength: 5
      pattern: '^[A-Za-z0-9_-]{5}$'
      description: Globally unique, case-sensitive Base64URL record identifier.
    ResourceIdentifier:
      description: >-
        Record resources use RecordPublicId; all other resource types use UUIDs.
      oneOf:
        - $ref: '#/components/schemas/RecordPublicId'
        - type: string
          format: uuid
    SourceKind:
      type: string
      enum: [client, agent, import, server]
    SourceReference:
      type: object
      required: [kind, provider]
      properties:
        kind:
          $ref: '#/components/schemas/SourceKind'
        provider:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$'
        externalId:
          type: string
          minLength: 1
          maxLength: 256
          description: Unique with `provider` within one user when present.
        url:
          type: string
          format: uri
          maxLength: 2048
        metadata:
          $ref: '#/components/schemas/ResourceMetadata'
      additionalProperties: false
    ResourceReference:
      type: object
      description: |
        Ordered typed relationship. Only identifiers are exposed; referenced
        payloads must be fetched through their own authorization boundary.
        Cross-user targets and every target referenced by a public source must
        be public.
      required: [relation, targetType, targetUserId, targetId]
      properties:
        relation:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[A-Za-z][A-Za-z0-9._:-]{0,63}$'
          default: reference
        targetType:
          type: string
          enum: [user, record, event]
        targetUserId:
          type: string
          format: uuid
        targetId:
          $ref: '#/components/schemas/ResourceIdentifier'
      additionalProperties: false
    ResourceReferenceInput:
      type: object
      required: [targetType, targetUserId, targetId]
      properties:
        relation:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[A-Za-z][A-Za-z0-9._:-]{0,63}$'
          default: reference
        targetType:
          type: string
          enum: [user, record, event]
        targetUserId:
          type: string
          format: uuid
        targetId:
          $ref: '#/components/schemas/ResourceIdentifier'
      additionalProperties: false
    ResourceReferenceList:
      type: array
      maxItems: 200
      default: []
      items:
        $ref: '#/components/schemas/ResourceReferenceInput'
    Location:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
      additionalProperties: false
    Weather:
      type: object
      properties:
        code:
          type: integer
          format: int32
        emoji:
          type: string
          maxLength: 32
        temperatureC:
          type: number
          minimum: -150
          maximum: 100
      additionalProperties: false
    PublicRecordPayload:
      type: object
      description: |
        Server-readable journal payload. Known fields support the first-party
        client; additional domain fields are preserved for forward-compatible
        agents and migrated records. The compact JSON representation must not
        exceed 262144 UTF-8 bytes, including a payload rendered from a template.
        Object keys and string values must be PostgreSQL-compatible Unicode text;
        U+0000 and unpaired UTF-16 surrogates are rejected.
      x-max-serialized-bytes: 262144
      properties:
        text:
          type: string
          maxLength: 100000
        emoji:
          type: string
          maxLength: 32
        context:
          $ref: '#/components/schemas/JsonObject'
        location:
          $ref: '#/components/schemas/Location'
        weather:
          $ref: '#/components/schemas/Weather'
      additionalProperties: true
      minProperties: 1
    TemplateRenderRequest:
      type: object
      required: [templateId, variables]
      properties:
        templateId:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
          description: Omit to render the current version.
        variables:
          $ref: '#/components/schemas/JsonObject'
      additionalProperties: false
    TemplateAttribution:
      type: object
      required: [templateId, version]
      properties:
        templateId:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
      additionalProperties: false
    CiphertextEnvelope:
      type: object
      description: |
        AES-256-GCM ciphertext including its authentication tag. Associated
        data canonically binds user, record, device, revision, opaque media
        IDs, crypto version, key version, and content type; clients must follow
        the linked crypto profile exactly.
      required:
        - algorithm
        - cryptoVersion
        - keyVersion
        - nonce
        - ciphertext
        - contentType
      properties:
        algorithm:
          type: string
          const: A256GCM
        cryptoVersion:
          type: integer
          const: 1
        keyVersion:
          type: integer
          const: 1
        nonce:
          type: string
          contentEncoding: base64
          description: Exactly 12 bytes after base64 decoding.
          minLength: 16
          maxLength: 16
        ciphertext:
          type: string
          contentEncoding: base64
          minLength: 24
          maxLength: 699052
          x-max-decoded-bytes: 524288
          description: |
            Ciphertext concatenated with the 16-byte GCM tag. Decoded content
            must not exceed 524288 bytes.
        contentType:
          type: string
          const: application/vnd.exeligmos.record+json
      additionalProperties: false
    PublicRecordInput:
      type: object
      required: [deviceId, occurredAt]
      properties:
        id:
          $ref: '#/components/schemas/RecordPublicId'
        originId:
          type: string
          format: uuid
          description: Optional owner-only storage identity for offline creation.
        deviceId:
          type: string
          format: uuid
        visibility:
          type: string
          const: public
          default: public
        occurredAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          description: Must not precede `occurredAt`.
        payload:
          $ref: '#/components/schemas/PublicRecordPayload'
        render:
          $ref: '#/components/schemas/TemplateRenderRequest'
        tagIds:
          type: array
          maxItems: 200
          uniqueItems: true
          default: []
          items:
            type: string
            format: uuid
        mediaIds:
          type: array
          maxItems: 200
          uniqueItems: true
          default: []
          items:
            type: string
            format: uuid
        metadata:
          $ref: '#/components/schemas/ResourceMetadata'
        source:
          $ref: '#/components/schemas/SourceReference'
        references:
          $ref: '#/components/schemas/ResourceReferenceList'
      oneOf:
        - properties:
            payload:
              $ref: '#/components/schemas/PublicRecordPayload'
            render:
              $ref: '#/components/schemas/TemplateRenderRequest'
          required: [payload]
          not:
            properties:
              render:
                $ref: '#/components/schemas/TemplateRenderRequest'
            required: [render]
        - properties:
            payload:
              $ref: '#/components/schemas/PublicRecordPayload'
            render:
              $ref: '#/components/schemas/TemplateRenderRequest'
          required: [render]
          not:
            properties:
              payload:
                $ref: '#/components/schemas/PublicRecordPayload'
            required: [payload]
      additionalProperties: false
    PrivateRecordInput:
      type: object
      required: [id, originId, deviceId, visibility, encryption]
      description: |
        The client-generated owner-only originId is required because the
        authenticated ciphertext binds it before upload. No occurrence time, source, label,
        tags, semantic metadata, or media description is accepted outside
        ciphertext. Opaque private-media IDs are exposed only so the server can
        authorize downloads and retain media that is still attached.
      properties:
        id:
          $ref: '#/components/schemas/RecordPublicId'
        originId:
          type: string
          format: uuid
          description: Required client-generated UUID used by crypto profile v1.
        deviceId:
          type: string
          format: uuid
        visibility:
          type: string
          const: private
        encryption:
          $ref: '#/components/schemas/CiphertextEnvelope'
        mediaIds:
          type: array
          maxItems: 200
          uniqueItems: true
          default: []
          items:
            type: string
            format: uuid
        references:
          $ref: '#/components/schemas/ResourceReferenceList'
      additionalProperties: false
    CreateRecordRequest:
      oneOf:
        - $ref: '#/components/schemas/PublicRecordInput'
        - $ref: '#/components/schemas/PrivateRecordInput'
      discriminator:
        propertyName: visibility
        mapping:
          public: '#/components/schemas/PublicRecordInput'
          private: '#/components/schemas/PrivateRecordInput'
    ReplaceRecordRequest:
      oneOf:
        - $ref: '#/components/schemas/PublicRecordInput'
        - $ref: '#/components/schemas/PrivateRecordInput'
      discriminator:
        propertyName: visibility
        mapping:
          public: '#/components/schemas/PublicRecordInput'
          private: '#/components/schemas/PrivateRecordInput'
    RecordCommon:
      type: object
      required:
        - id
        - originId
        - userId
        - deviceId
        - visibility
        - revision
        - createdAt
        - updatedAt
        - references
      properties:
        id:
          $ref: '#/components/schemas/RecordPublicId'
          readOnly: true
        originId:
          type: string
          format: uuid
          readOnly: true
          description: >-
            Owner-only immutable UUID used for storage identity and crypto profile v1.
        userId:
          type: string
          format: uuid
          readOnly: true
        deviceId:
          type: string
          format: uuid
          readOnly: true
        visibility:
          $ref: '#/components/schemas/RecordVisibility'
        revision:
          type: integer
          format: int64
          minimum: 1
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        references:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/ResourceReference'
    PublicRecord:
      allOf:
        - $ref: '#/components/schemas/RecordCommon'
        - type: object
          description: Authenticated owner representation of a record whose visibility is public.
          required:
            - visibility
            - author
            - occurredAt
            - payload
            - tagIds
            - tags
            - media
            - metadata
          properties:
            visibility:
              type: string
              const: public
            author:
              $ref: '#/components/schemas/PublicUserSummary'
            occurredAt:
              type: string
              format: date-time
            endedAt:
              type: string
              format: date-time
            payload:
              $ref: '#/components/schemas/PublicRecordPayload'
            template:
              $ref: '#/components/schemas/TemplateAttribution'
            tagIds:
              type: array
              maxItems: 200
              uniqueItems: true
              items:
                type: string
                format: uuid
            tags:
              type: array
              maxItems: 200
              items:
                $ref: '#/components/schemas/PublicTagSummary'
            media:
              type: array
              maxItems: 200
              items:
                $ref: '#/components/schemas/MediaObject'
            metadata:
              $ref: '#/components/schemas/ResourceMetadata'
            source:
              $ref: '#/components/schemas/SourceReference'
      unevaluatedProperties: false
    PrivateRecord:
      allOf:
        - $ref: '#/components/schemas/RecordCommon'
        - type: object
          description: |
            Outside `encryption`, only the common opaque identity, ownership,
            visibility, revision, server timestamps, and device fields
            are exposed. All semantic fields remain encrypted.
          required: [visibility, encryption, media]
          properties:
            visibility:
              type: string
              const: private
            encryption:
              $ref: '#/components/schemas/CiphertextEnvelope'
            media:
              type: array
              maxItems: 200
              items:
                $ref: '#/components/schemas/MediaObject'
      unevaluatedProperties: false
    Record:
      oneOf:
        - $ref: '#/components/schemas/PublicRecord'
        - $ref: '#/components/schemas/PrivateRecord'
      discriminator:
        propertyName: visibility
        mapping:
          public: '#/components/schemas/PublicRecord'
          private: '#/components/schemas/PrivateRecord'
    PublicRecordPatch:
      type: object
      required: [visibility]
      minProperties: 2
      properties:
        visibility:
          type: string
          const: public
        deviceId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        endedAt:
          type: [string, 'null']
          format: date-time
        payload:
          $ref: '#/components/schemas/PublicRecordPayload'
        tagIds:
          type: array
          maxItems: 200
          uniqueItems: true
          items:
            type: string
            format: uuid
        mediaIds:
          type: array
          maxItems: 200
          uniqueItems: true
          items:
            type: string
            format: uuid
        metadata:
          $ref: '#/components/schemas/ResourceMetadata'
        source:
          oneOf:
            - $ref: '#/components/schemas/SourceReference'
            - type: 'null'
        references:
          $ref: '#/components/schemas/ResourceReferenceList'
      additionalProperties: false
    PrivateRecordPatch:
      type: object
      required: [visibility, encryption]
      minProperties: 2
      description: |
        No semantic, source, or occurrence fields are accepted outside
        ciphertext. A fresh envelope is required for every new revision.
      properties:
        visibility:
          type: string
          const: private
        deviceId:
          type: string
          format: uuid
        encryption:
          $ref: '#/components/schemas/CiphertextEnvelope'
        mediaIds:
          type: array
          maxItems: 200
          uniqueItems: true
          items:
            type: string
            format: uuid
        references:
          $ref: '#/components/schemas/ResourceReferenceList'
      additionalProperties: false
    UpdateRecordRequest:
      oneOf:
        - $ref: '#/components/schemas/PublicRecordPatch'
        - $ref: '#/components/schemas/PrivateRecordPatch'
      discriminator:
        propertyName: visibility
        mapping:
          public: '#/components/schemas/PublicRecordPatch'
          private: '#/components/schemas/PrivateRecordPatch'
    RecordPage:
      allOf:
        - $ref: '#/components/schemas/CursorPageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Record'
    PublicRecordProjection:
      type: object
      description: |
        Anonymous public representation. It omits the creating device and all
        owner-only UUID origin and media URLs while preserving explicitly public content.
      required:
        - id
        - userId
        - author
        - visibility
        - occurredAt
        - payload
        - tagIds
        - tags
        - media
        - metadata
        - references
        - revision
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: '#/components/schemas/RecordPublicId'
        userId:
          type: string
          format: uuid
        author:
          $ref: '#/components/schemas/PublicUserSummary'
        visibility:
          type: string
          const: public
        occurredAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        payload:
          $ref: '#/components/schemas/PublicRecordPayload'
        template:
          $ref: '#/components/schemas/TemplateAttribution'
        tagIds:
          type: array
          maxItems: 200
          uniqueItems: true
          items:
            type: string
            format: uuid
        tags:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/PublicTagSummary'
        media:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/PublicMediaObject'
        metadata:
          $ref: '#/components/schemas/ResourceMetadata'
        source:
          $ref: '#/components/schemas/SourceReference'
        references:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/ResourceReference'
        revision:
          type: integer
          format: int64
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false
    PublicRecordProjectionPage:
      allOf:
        - $ref: '#/components/schemas/CursorPageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/PublicRecordProjection'
    CreateEventRequest:
      type: object
