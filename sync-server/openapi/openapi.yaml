                  fileName: aurora.jpg
                  contentType: image/jpeg
                  byteLength: 834234
                  sha256: 847b668fdcbf5fbe1b47ae5d01cf3f45eb9cd57475e030bff559b9d576c3fda2
              privatePhoto:
                value:
                  mediaId: 6ec0ed9e-32eb-4e70-8ac3-082b1dc240da
