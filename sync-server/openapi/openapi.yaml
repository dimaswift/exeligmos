    MediaEncryption:
      type: object
      description: Encryption metadata for ciphertext stored as the media byte stream.
      required: [algorithm, cryptoVersion, keyVersion, nonce]
      properties:
        algorithm:
          type: string
          const: A256GCM
        cryptoVersion:
          type: integer
          const: 1
        keyVersion:
          type: integer
          const: 1
        nonce:
          type: string
          contentEncoding: base64
          minLength: 16
          maxLength: 16
          description: Exactly 12 bytes after base64 decoding.
        plaintextContentType:
          $ref: '#/components/schemas/MediaContentType'
          description: Optional privacy tradeoff disclosed by the encrypting client.
      additionalProperties: false
    CreateMediaUploadRequest:
      type: object
      required: [deviceId, fileName, contentType, byteLength, sha256]
      properties:
        mediaId:
          type: string
          format: uuid
          description: |
            Optional client-generated media ID. It is required for encrypted
            media because the ID participates in per-object key derivation.
        deviceId:
          type: string
          format: uuid
        fileName:
          type: string
          minLength: 1
          maxLength: 255
          pattern: '^[^/\\\\]+$'
        contentType:
          $ref: '#/components/schemas/MediaContentType'
        byteLength:
          type: integer
          format: int64
          minimum: 1
          maximum: 5368709120
        sha256:
          $ref: '#/components/schemas/Sha256'
        encryption:
          $ref: '#/components/schemas/MediaEncryption'
      dependentRequired:
        encryption: [mediaId]
      additionalProperties: false
    MediaUploadStatus:
      type: string
      enum: [reserved, received, completed, aborted, expired]
    MediaUpload:
      type: object
      required:
        - id
