    SyncResourceCount:
      type: object
      required: [total]
      properties:
        total:
          type: integer
          format: int64
          minimum: 0
      additionalProperties: false
    SyncStats:
      type: object
      required: [cursor, records, events, tags, templates, media]
      properties:
        cursor:
          type: string
          minLength: 2
          description: Opaque all-resource change cursor captured with these totals.
        records:
          type: object
          required: [total, public, private, pastTera, pastGiga, pastMega]
          properties:
            total: { type: integer, format: int64, minimum: 0 }
            public: { type: integer, format: int64, minimum: 0 }
            private: { type: integer, format: int64, minimum: 0 }
            pastTera: { type: integer, format: int64, minimum: 0 }
            pastGiga: { type: integer, format: int64, minimum: 0 }
            pastMega: { type: integer, format: int64, minimum: 0 }
          additionalProperties: false
        events:
          $ref: '#/components/schemas/SyncResourceCount'
        tags:
          $ref: '#/components/schemas/SyncResourceCount'
        templates:
          $ref: '#/components/schemas/SyncResourceCount'
        media:
          type: object
          required: [total, byteLength, photo, video, audio, restorable, restorableByteLength]
          properties:
            total: { type: integer, format: int64, minimum: 0 }
            byteLength: { type: integer, format: int64, minimum: 0 }
            photo: { type: integer, format: int64, minimum: 0 }
            video: { type: integer, format: int64, minimum: 0 }
            audio: { type: integer, format: int64, minimum: 0 }
            restorable: { type: integer, format: int64, minimum: 0 }
            restorableByteLength: { type: integer, format: int64, minimum: 0 }
          additionalProperties: false
      additionalProperties: false
    SyncResourceType:
      type: string
      enum: [record, event, tag, template, device, media, user, subscription]
    ChangeOperation:
      type: string
      enum: [upsert, delete]
    Tombstone:
      type: object
      required: [id, userId, resourceType, revision, deletedAt]
      properties:
        id:
          $ref: '#/components/schemas/ResourceIdentifier'
        userId:
          type: string
          format: uuid
        resourceType:
          $ref: '#/components/schemas/SyncResourceType'
        revision:
          type: integer
          format: int64
          minimum: 1
        deletedAt:
          type: string
          format: date-time
      additionalProperties: false
    SyncResource:
      oneOf:
        - $ref: '#/components/schemas/Record'
        - $ref: '#/components/schemas/Event'
        - $ref: '#/components/schemas/Tag'
        - $ref: '#/components/schemas/Template'
        - $ref: '#/components/schemas/Device'
        - $ref: '#/components/schemas/MediaObject'
        - $ref: '#/components/schemas/User'
        - $ref: '#/components/schemas/Subscription'
    Change:
      type: object
      required:
        - sequence
        - changedAt
        - resourceType
        - operation
        - resourceId
        - revision
        - etag
      properties:
        sequence:
          type: integer
          format: int64
          minimum: 1
        changedAt:
          type: string
          format: date-time
        resourceType:
          $ref: '#/components/schemas/SyncResourceType'
        operation:
          $ref: '#/components/schemas/ChangeOperation'
        resourceId:
          $ref: '#/components/schemas/ResourceIdentifier'
        revision:
          type: integer
          format: int64
          minimum: 1
        etag:
          type: string
          minLength: 3
        resource:
          $ref: '#/components/schemas/SyncResource'
        tombstone:
          $ref: '#/components/schemas/Tombstone'
      oneOf:
        - properties:
            operation:
              const: upsert
            resource:
              $ref: '#/components/schemas/SyncResource'
            tombstone:
              $ref: '#/components/schemas/Tombstone'
          required: [resource]
          not:
            properties:
              tombstone:
                $ref: '#/components/schemas/Tombstone'
            required: [tombstone]
        - properties:
            operation:
              const: delete
            resource:
              $ref: '#/components/schemas/SyncResource'
            tombstone:
              $ref: '#/components/schemas/Tombstone'
          required: [tombstone]
          not:
            properties:
              resource:
                $ref: '#/components/schemas/SyncResource'
            required: [resource]
      additionalProperties: false
    ChangePage:
      allOf:
        - $ref: '#/components/schemas/CursorPageMeta'
        - type: object
          required: [data, nextCursor]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Change'
            nextCursor:
              type: string
              minLength: 1
              maxLength: 2048
    MutationId:
      type: string
      minLength: 8
      maxLength: 128
      pattern: '^[A-Za-z0-9._:-]+$'
    UpsertRecordMutation:
      type: object
      required: [kind, clientMutationId, record]
      properties:
        kind:
          type: string
          const: upsertRecord
        clientMutationId:
          $ref: '#/components/schemas/MutationId'
        ifMatch:
          type: string
          description: >-
            Optional compatibility hint. Record synchronization is
            client-authoritative: an active or deleted relay copy with the same
            ID is replaced by the submitted local record even when this value
            is absent or stale.
        record:
          $ref: '#/components/schemas/CreateRecordRequest'
      additionalProperties: false
    UpsertEventMutation:
      type: object
      required: [kind, clientMutationId, event]
      properties:
        kind:
          type: string
          const: upsertEvent
        clientMutationId:
          $ref: '#/components/schemas/MutationId'
        ifMatch:
          type: string
          description: Required when replacing an existing event.
        event:
          $ref: '#/components/schemas/CreateEventRequest'
      additionalProperties: false
    UpsertTagMutation:
      type: object
      required: [kind, clientMutationId, tag]
      properties:
        kind:
          type: string
          const: upsertTag
        clientMutationId:
          $ref: '#/components/schemas/MutationId'
        ifMatch:
          type: string
          description: Required when replacing an existing tag.
        tag:
          $ref: '#/components/schemas/CreateTagRequest'
      additionalProperties: false
    UpsertTemplateMutation:
      type: object
      required: [kind, clientMutationId, template]
      properties:
        kind:
          type: string
          const: upsertTemplate
        clientMutationId:
          $ref: '#/components/schemas/MutationId'
        ifMatch:
          type: string
          description: Required when creating a new template version.
        template:
          $ref: '#/components/schemas/CreateTemplateRequest'
      additionalProperties: false
    DeleteMutation:
      type: object
      required: [kind, clientMutationId, resourceType, resourceId, ifMatch]
      properties:
        kind:
          type: string
          const: delete
        clientMutationId:
          $ref: '#/components/schemas/MutationId'
        resourceType:
          type: string
          enum: [record, event, tag, template]
        resourceId:
          $ref: '#/components/schemas/ResourceIdentifier'
        ifMatch:
          type: string
          minLength: 3
      additionalProperties: false
    SyncMutation:
      oneOf:
        - $ref: '#/components/schemas/UpsertRecordMutation'
        - $ref: '#/components/schemas/UpsertEventMutation'
        - $ref: '#/components/schemas/UpsertTagMutation'
        - $ref: '#/components/schemas/UpsertTemplateMutation'
        - $ref: '#/components/schemas/DeleteMutation'
      discriminator:
        propertyName: kind
        mapping:
          upsertRecord: '#/components/schemas/UpsertRecordMutation'
          upsertEvent: '#/components/schemas/UpsertEventMutation'
          upsertTag: '#/components/schemas/UpsertTagMutation'
          upsertTemplate: '#/components/schemas/UpsertTemplateMutation'
          delete: '#/components/schemas/DeleteMutation'
    SyncBatchRequest:
      type: object
      required: [deviceId, mutations]
      properties:
        deviceId:
          type: string
          format: uuid
          description: Must match an API key's bound device when API-key authenticated.
        atomic:
          type: boolean
          default: false
        mutations:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/SyncMutation'
      additionalProperties: false
    MutationStatus:
      type: string
      enum: [succeeded, failed]
    SyncMutationResult:
      type: object
      required: [clientMutationId, status]
      properties:
        clientMutationId:
          $ref: '#/components/schemas/MutationId'
        status:
          $ref: '#/components/schemas/MutationStatus'
        resourceType:
          $ref: '#/components/schemas/SyncResourceType'
        resourceId:
          $ref: '#/components/schemas/ResourceIdentifier'
        revision:
          type: integer
          format: int64
          minimum: 1
        etag:
          type: string
        problem:
          $ref: '#/components/schemas/Problem'
      additionalProperties: false
    SyncBatchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/SyncMutationResult'
      additionalProperties: false
