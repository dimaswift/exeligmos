  /v1/sync/changes:
    get:
      operationId: getSyncChanges
      tags: [Synchronization]
      summary: Read the authenticated user's ordered change feed
      description: |
        Before the first request, fully reconcile the authoritative owner
        collections the client stores; a request without `cursor` is a feed
        anchor, not a replacement for that snapshot after change retention has
        pruned older rows. Then omit `cursor`, apply changes in returned order,
        and persist `nextCursor` only after the entire page commits locally.
        Upserts contain the complete current resource. Deletes contain
        tombstones. Cursors are user- and query-bound; using one with another
        user or a different resource filter returns `400`.
      x-required-scopes: [sync:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: resourceType
          in: query
