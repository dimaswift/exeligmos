        - uploadUrl
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        userId:
          type: string
          format: uuid
          readOnly: true
        deviceId:
          type: string
          format: uuid
          readOnly: true
        status:
          $ref: '#/components/schemas/MediaUploadStatus'
        fileName:
          type: string
          maxLength: 255
        contentType:
          $ref: '#/components/schemas/MediaContentType'
        byteLength:
          type: integer
          format: int64
          minimum: 1
        receivedBytes:
          type: integer
          format: int64
          minimum: 0
          readOnly: true
        sha256:
          $ref: '#/components/schemas/Sha256'
        encryption:
          $ref: '#/components/schemas/MediaEncryption'
        uploadUrl:
          type: string
          format: uri-reference
          readOnly: true
        expiresAt:
          type: string
          format: date-time
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        mediaId:
          type: string
          format: uuid
          readOnly: true
      additionalProperties: false
    MediaObject:
      type: object
      required:
        - id
        - userId
        - deviceId
        - fileName
        - contentType
        - byteLength
        - sha256
        - revision
        - createdAt
        - contentUrl
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        userId:
          type: string
          format: uuid
          readOnly: true
        deviceId:
          type: string
          format: uuid
          readOnly: true
        fileName:
          type: string
          maxLength: 255
        contentType:
          $ref: '#/components/schemas/MediaContentType'
        byteLength:
          type: integer
          format: int64
          minimum: 1
        sha256:
          $ref: '#/components/schemas/Sha256'
        encryption:
          $ref: '#/components/schemas/MediaEncryption'
        revision:
          type: integer
          format: int64
          minimum: 1
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        contentUrl:
          type: string
          format: uri-reference
