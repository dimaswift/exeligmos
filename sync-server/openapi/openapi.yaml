        - $ref: '#/components/parameters/VisibilityFilter'
        - $ref: '#/components/parameters/DeviceIdFilter'
        - $ref: '#/components/parameters/TagIdFilter'
        - $ref: '#/components/parameters/OccurredAfter'
        - $ref: '#/components/parameters/OccurredBefore'
