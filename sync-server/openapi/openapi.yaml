        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    patch:
      operationId: updateRecord
      tags: [Records]
      summary: Patch a record without changing visibility
      description: |
        For public records, `payload` and `metadata` use RFC 7396 merge-patch
        semantics; `source`, when present, replaces the whole value instead of
        merging nested members. The required `visibility` discriminator must
        match the current record; `userId`, `revision`, and lifecycle timestamps
        are rejected. Every private patch includes a fresh envelope because the
        authenticated ciphertext is bound to the resulting revision.
      x-required-scopes: [records:write]
      x-body-limit-bytes: 1048576
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/UpdateRecordRequest'
      responses:
        '200':
          description: Record updated and revision incremented.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
