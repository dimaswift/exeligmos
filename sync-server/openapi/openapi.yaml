openapi: 3.1.0
info:
  title: Exeligmos API
  version: 2.0.0
  summary: Server-authoritative journal, event, and synchronization API.
  description: |
    The Exeligmos v2 API is the only supported server contract after migration.
    It is multi-user, cursor-synchronized, and intended for the first-party iOS
    client as well as user-authorized automation agents.

    Authentication uses either a short-lived JWT access token (`JwtBearer`) or
    a user-issued API key (`ApiKeyBearer`) in the `Authorization: Bearer ...`
    header. API keys are bound to one user and one logical device. Operations
    carrying `x-required-scopes` enforce those scopes for API-key callers; JWT
    sessions act with the authenticated user's full authority.

    Production deployments must expose the API only over HTTPS/TLS and reject
    plain HTTP at the edge. Passwords and bearer credentials are otherwise
    observable in transit. Plain HTTP is for loopback development only.

    Records are public by default. Public record payloads are readable and may
    be rendered from a versioned template. Private record payloads and private
    media are encrypted by the client before upload; the server stores only an
    authenticated ciphertext envelope and intentionally cannot render, index,
    or embed their plaintext.

    All timestamps are RFC 3339 instants. Record API identifiers are globally
    unique five-character Base64URL strings; their owner-only `originId` UUIDs
    remain the storage and cryptographic identities. Other user-owned identifiers
    are UUIDs.
    Collection order is stable and cursor based. Cursors are opaque and must
    never be parsed or constructed by clients.

    Resource requests use shared PostgreSQL fixed-window limits across all
    server replicas. Anonymous public-record reads are limited per source IP
    and by a cluster-wide aggregate. Authenticated owner, security, record, and
    event, tag, template, media, and synchronization operations use both
    aggregate-user and individual-principal buckets.
    A `429` response includes `Retry-After`; clients must delay rather than
    immediately retrying.

    Implementation status (Phase 3): every operation in this document has a
    running handler. The server includes the complete v2 resource surface,
    streamed media storage, and ordered synchronization APIs.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
externalDocs:
  description: Exeligmos private-record cryptographic profile v1
  url: ../docs/crypto-v1.md
servers:
  - url: /
    description: Same origin as the served API document
tags:
  - name: Health
    description: Process liveness and dependency readiness.
  - name: Authentication
    description: Password login and rotating JWT-backed sessions.
  - name: API keys
    description: Scoped, device-bound automation credentials.
  - name: Devices
    description: User-owned client and agent identities.
  - name: Records
    description: Public journal documents and private ciphertext envelopes.
  - name: Events
    description: Lightweight time intervals without media or embeddings.
  - name: Tags
    description: User-owned record classification labels.
  - name: Templates
    description: Versioned server-rendered public record templates.
  - name: Media
    description: Streaming upload sessions and immutable media bytes.
  - name: Synchronization
    description: Ordered changes and bounded idempotent mutation batches.
  - name: Social
    description: Public profiles and private owner subscriptions.
  - name: Public activity
    description: Durable cursor feed of public user lifecycle controls and record/event revisions.
security:
  - JwtBearer: []
  - ApiKeyBearer: []
x-exeligmos-implementation:
  phase: 3
  implementedTags: [Health, Authentication, API keys, Devices, Records, Events, Tags, Templates, Media, Synchronization, Social, Public activity]
  plannedTags: []
x-exeligmos-resource-rate-limits:
  windowSeconds: 60
  publicRecordReads:
    cluster: 3000
    perIp: 120
  authenticatedReads:
    perUser: 1200
    perPrincipal: 600
  authenticatedWrites:
    perUser: 240
    perPrincipal: 120
paths:
  /health/live:
    get:
      operationId: getLiveness
      tags: [Health]
      summary: Check that the process is alive
      security: []
      responses:
        '200':
          description: The process is running.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Liveness'
              example:
                status: ok
  /health/ready:
    get:
      operationId: getReadiness
      tags: [Health]
      summary: Check database and extension readiness
      security: []
      responses:
        '200':
          description: The service, PostgreSQL, and pgvector are ready.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Readiness'
              example:
                status: ready
                checks:
                  database: up
                  pgvector: up
        '503':
          description: At least one required dependency is unavailable.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
            Retry-After:
              schema:
                type: integer
                minimum: 1
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ReadinessProblem'
  /v1/auth/register:
    post:
      operationId: registerUser
      tags: [Authentication]
      summary: Register a user and start a session
      description: |
        Availability depends on the deployment registration mode (`open`,
        `invite`, or `closed`). Passwords are never used directly as private
        record encryption keys.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login: aurora
              password: correct-horse-battery-staple
              displayName: Aurora Observer
              inviteCode: EXELIGMOS-2026
      responses:
        '201':
          description: User and initial session created.
          headers:
            Location:
              description: URL of the new user resource.
              schema:
                type: string
                format: uri-reference
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/auth/login:
    post:
      operationId: loginUser
      tags: [Authentication]
      summary: Exchange login and password for a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: aurora
              password: correct-horse-battery-staple
      responses:
        '200':
          description: Login succeeded.
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-store
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/auth/refresh:
    post:
      operationId: refreshSession
      tags: [Authentication]
      summary: Rotate a refresh token and issue a new access token
      description: |
        Refresh tokens are opaque, single-use rotation credentials. Reuse of a
        previously rotated token revokes its token family.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token rotation succeeded.
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-store
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/auth/logout:
    post:
      operationId: logoutUser
      tags: [Authentication]
      summary: Revoke the current refresh-token family
      security:
        - JwtBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Session revoked. The operation is idempotent.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/me:
    get:
      operationId: getCurrentUser
      tags: [Authentication]
      summary: Get the authenticated user
      security:
        - JwtBearer: []
        - ApiKeyBearer: []
      responses:
        '200':
          description: Current user profile.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    patch:
      operationId: updateCurrentUser
      tags: [Authentication]
      summary: Update authenticated user preferences
      description: |
        JWT-only. Updates the Saros-series anchor used by temporal clocks and
        record presentation. Supply the strong ETag returned by `GET /v1/me`.
      security:
        - JwtBearer: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User preferences updated.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/me/encryption-profile:
    get:
      operationId: getEncryptionProfile
      tags: [Authentication]
      summary: Read the user's client-encryption profile
      description: |
        JWT-only. The response contains a non-secret verification value, never
        the mnemonic, BIP-39 seed, or any derived encryption key. A 404 means
        the client should offer first-time 12-word recovery setup.
      security:
        - JwtBearer: []
      responses:
        '200':
          description: The user's encryption profile.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptionProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      operationId: initializeEncryptionProfile
      tags: [Authentication]
      summary: Initialize mnemonic recovery for this user
      description: |
        JWT-only and create-once in crypto profile v1. The client generates the
        mnemonic locally and sends only its derived key-check value. The same
        idempotency key and body return the original response; a different
        initialization after setup returns 409.
      security:
        - JwtBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEncryptionProfileRequest'
      responses:
        '201':
          description: Encryption profile initialized.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptionProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/api-keys:
    get:
      operationId: listApiKeys
      tags: [API keys]
      summary: List API-key metadata
      description: Secret values are never returned by list operations.
      security:
        - JwtBearer: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: API keys ordered by creation time and ID.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      operationId: createApiKey
      tags: [API keys]
      summary: Issue an API key and return its secret once
      description: |
        The plaintext secret is returned exactly once. The key is bound to the
        selected active device. Requests authenticated with the key may only
        assert that device ID and may only use granted scopes.

        If the 201 response is lost, replay the identical request with the same
        `Idempotency-Key`. The server does not repeat the secret: it returns 409
        `api_key_secret_already_returned` with the created `apiKeyId`. Use that ID
        with a JWT-authenticated API-key inspection or revocation request. Reuse
        of the idempotency key with a different body returns
        `idempotency_conflict`.
      security:
        - JwtBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
            example:
              name: Solar flare watcher
              deviceId: 2dca8eab-00a8-4e94-9bd2-2fcbfe17e890
              scopes:
                - records:read
                - records:write
                - events:read
                - events:write
              expiresAt: '2027-07-14T00:00:00Z'
      responses:
        '201':
          description: API key issued.
          headers:
            Location:
              schema:
                type: string
                format: uri-reference
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedApiKey'
              example:
                key:
                  id: a8ec5fdc-e6cf-4bc6-b00b-3db4ca240f12
                  userId: e42b4fde-8baf-4b95-8bc8-5395b68d0dd2
                  deviceId: 2dca8eab-00a8-4e94-9bd2-2fcbfe17e890
                  name: Solar flare watcher
                  prefix: exk_9f4c2a1b
                  scopes: [records:read, records:write, events:read, events:write]
                  createdAt: '2026-07-14T18:00:00Z'
                  expiresAt: '2027-07-14T00:00:00Z'
                  revokedAt: null
                  lastUsedAt: null
                secret: exk_9f4c2a1b8e7d6c5b4a3928170615f0e1d2c3b4a5968778695a4b3c2d1e0f9a8b
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: |
            The same API key was created already and its one-time secret cannot
            be returned again, or the idempotency key was reused with a different
            request. A same-body replay includes the created `apiKeyId`.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreationConflictProblem'
              examples:
                secretAlreadyReturned:
                  summary: Same request replayed after the secret was returned
                  value:
                    type: https://api.exeligmos.app/problems/api-key-secret-already-returned
                    title: Conflict
                    status: 409
                    detail: The key exists, but its plaintext secret cannot be returned again.
                    code: api_key_secret_already_returned
                    requestId: req_01J2V8E3VBA5QYFAE6BX27DE5Z
                    apiKeyId: a8ec5fdc-e6cf-4bc6-b00b-3db4ca240f12
                differentRequest:
                  summary: Idempotency key reused with a different body
                  value:
                    type: https://api.exeligmos.app/problems/idempotency-conflict
                    title: Conflict
                    status: 409
                    detail: This idempotency key was already used with a different request.
                    code: idempotency_conflict
                    requestId: req_01J2V8E3VBA5QYFAE6BX27DE5Z
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/api-keys/{apiKeyId}:
    parameters:
      - $ref: '#/components/parameters/ApiKeyId'
    get:
      operationId: getApiKey
      tags: [API keys]
      summary: Get API-key metadata
      security:
        - JwtBearer: []
      responses:
        '200':
          description: API-key metadata without its secret.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: revokeApiKey
      tags: [API keys]
      summary: Revoke an API key
      description: Revocation is immediate and idempotent.
      security:
        - JwtBearer: []
      responses:
        '204':
          description: Key revoked or already revoked.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/devices:
    get:
      operationId: listDevices
      tags: [Devices]
      summary: List the user's logical devices
      x-required-scopes: [devices:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Devices ordered by registration time and ID.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      operationId: registerDevice
      tags: [Devices]
      summary: Register a client or automation device
      description: |
        API keys are issued only after their logical device exists. Registration
        does not bind the caller's login session. A first-party client binds its
        own current session with `PUT /v1/devices/{deviceId}/current-session`;
        creating an automation device must not rebind the human operator.
      security:
        - JwtBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
            example:
              name: Solar flare agent
              kind: agent
              platform: python
              appVersion: 1.0.0
      responses:
        '201':
          description: Device registered.
          headers:
            Location:
              schema:
                type: string
                format: uri-reference
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/devices/{deviceId}:
    parameters:
      - $ref: '#/components/parameters/DeviceId'
    get:
      operationId: getDevice
      tags: [Devices]
      summary: Get a logical device
      x-required-scopes: [devices:read]
      responses:
        '200':
          description: Device metadata.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    patch:
      operationId: updateDevice
      tags: [Devices]
      summary: Update device metadata
      security:
        - JwtBearer: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceRequest'
      responses:
        '200':
          description: Device updated.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: revokeDevice
      tags: [Devices]
      summary: Revoke a device and every credential bound to it
      description: |
        Revokes the device, its active API keys, and all active JWT access and
        refresh-token families explicitly bound to it. Login sessions that were
        never bound, or that are bound to another device, are not affected.
      security:
        - JwtBearer: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: |
            Device, active API keys, and bound sessions revoked; a device sync
            tombstone was emitted.
          headers:
