  /v1/sync/batches:
    post:
      operationId: applySyncBatch
      tags: [Synchronization]
      summary: Apply a bounded batch of idempotent client mutations
      description: |
        Mutations are evaluated in array order. Each carries a stable
        `clientMutationId`. With `atomic: false` (the default), failures are
        reported per item and do not roll back successful siblings. With
        `atomic: true`, any failure rolls back the full batch and returns `409`.
        Successful writes enter the same change feed as direct API writes.
      x-required-scopes: [sync:write]
      x-body-limit-bytes: 16777216
      parameters:
