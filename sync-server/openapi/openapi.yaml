          style: form
          explode: true
          schema:
            type: array
            maxItems: 8
            uniqueItems: true
            items:
              $ref: '#/components/schemas/SyncResourceType'
      responses:
        '200':
          description: Ordered changes and the cursor after the last returned sequence.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePage'
              example:
                data:
