        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: deleteRecord
      tags: [Records]
      summary: Soft-delete a record
      description: |
        A durable tombstone remains in the change feed. Deleting a private
        record increments its revision and clears the current encryption
        envelope; the prior live revision retains the ciphertext authenticated
        for that prior revision. A public record's stored public content is not
        cleared, although deleted records are no longer returned by record read
        or list operations.
