services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18@sha256:42e7f6b4e1eceb02ff14e3e6bc6108bbe259abbe83879dc1845d0da1ddeb555d
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exeligmos}
      POSTGRES_USER: ${POSTGRES_USER:-exeligmos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in sync-server/.env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - exeligmos_postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    stop_grace_period: 30s

volumes:
  exeligmos_postgres_data:
